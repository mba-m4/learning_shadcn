<!DOCTYPE html>
<html>
<head>
  <title>Login Test</title>
</head>
<body>
  <h1>Login Test</h1>
  <button onclick="testLogin()">Test Login</button>
  <pre id="output"></pre>

  <script>
    async function testLogin() {
      const output = document.getElementById('output');
      output.textContent = 'Testing login...\n';
      
      try {
        const body = new URLSearchParams({
          username: 'test',
          password: 'test'
        });
        
        output.textContent += 'Request body: ' + body.toString() + '\n';
        
        const response = await fetch('http://localhost:8000/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'Accept': 'application/json',
          },
          body: body.toString(),
        });
        
        output.textContent += 'Response status: ' + response.status + '\n';
        output.textContent += 'Response ok: ' + response.ok + '\n';
        
        const data = await response.json();
        output.textContent += 'Response data:\n' + JSON.stringify(data, null, 2) + '\n';
      } catch (error) {
        output.textContent += 'Error: ' + error.message + '\n';
      }
    }
  </script>
</body>
</html>
